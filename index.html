<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2f3640">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="세왕상사 모니터">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>세왕상사 신규업장 모니터</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    background: #fafaf7;
    color: #1f1f1f;
    font-size: 14px;
    line-height: 1.5;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  header.top {
    padding: 12px 14px 6px;
    border-bottom: 1px solid #e7e5df;
    background: #fff;
    position: sticky; top: 0; z-index: 5;
  }
  header.top h1 { margin: 0 0 2px; font-size: 16px; font-weight: 700; }
  header.top .sub { color: #6b6b6b; font-size: 11.5px; }
  .tabs {
    display: flex; gap: 2px; padding: 6px 8px 0; background: #fff;
    border-bottom: 1px solid #e7e5df; overflow-x: auto;
    position: sticky; top: 50px; z-index: 4;
    -webkit-overflow-scrolling: touch;
  }
  .tab {
    padding: 6px 10px; border-radius: 8px 8px 0 0; cursor: pointer;
    font-size: 12px; color: #555; border: 1px solid transparent;
    border-bottom: none; white-space: nowrap; user-select: none;
  }
  .tab.active { background: #fafaf7; color: #111; border-color: #e7e5df; font-weight: 600; }
  .tab .count {
    display: inline-block; min-width: 16px; text-align: center;
    background: #efece4; color: #6b6b6b; border-radius: 9px;
    padding: 0 5px; margin-left: 4px; font-size: 10px;
  }
  .controls {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px;
    align-items: center; background: #fff; border-bottom: 1px solid #e7e5df;
  }
  .controls label { font-size: 11.5px; color: #555; }
  .controls select, .controls input {
    border: 1px solid #d8d5cd; background: #fff; padding: 5px 8px;
    border-radius: 6px; font-size: 12px; color: #1f1f1f;
  }
  .btn {
    border: 1px solid #2f3640; background: #2f3640; color: #fff;
    padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .btn.ghost { background: #fff; color: #2f3640; }
  .btn.small { padding: 3px 8px; font-size: 11.5px; }
  .filter-row {
    display: flex; gap: 4px; padding: 0 12px 6px; background: #fff;
    border-bottom: 1px solid #e7e5df; flex-wrap: wrap; align-items: center;
  }
  .filter-row .filter-btn {
    padding: 3px 9px; border-radius: 999px; cursor: pointer;
    font-size: 11px; border: 1px solid #d8d5cd; background: #fff;
    color: #555;
  }
  .filter-row .filter-btn.active { background: #2f3640; color: #fff; border-color: #2f3640; }
  .filter-row .filter-btn[data-f="client"].active { background: #d44a4a; border-color: #d44a4a; }
  .filter-row .filter-btn[data-f="prospect"].active { background: #3d6033; border-color: #3d6033; }
  .panel { padding: 10px 12px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .card {
    background: #fff; border: 1px solid #e7e5df; border-radius: 10px;
    padding: 10px 12px; display: flex; flex-direction: column; gap: 5px;
  }
  .card.client { border-color: #f4c5c5; box-shadow: inset 4px 0 0 #d44a4a; }
  .card.client .title::before { content: "🏷️ "; color: #d44a4a; }
  .card .title { font-weight: 600; font-size: 13.5px; line-height: 1.35; color: #111; word-break: keep-all; }
  .card .title b { color: #b08a36; font-weight: 600; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 11px; color: #6b6b6b; }
  .card .meta .badge { background: #f4f1e8; color: #6b5a2a; padding: 1px 7px; border-radius: 999px; }
  .card .meta .badge.region { background: #eaf2e8; color: #3d6033; }
  .card .meta .badge.cat { background: #ece8f5; color: #4d3f7a; }
  .card .meta .badge.client { background: #fde8e8; color: #a83232; font-weight: 700; }
  .card .desc { font-size: 12px; color: #444; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card .desc b { color: #b08a36; }
  .card .actions { display: flex; gap: 6px; margin-top: 4px; align-items: center; justify-content: space-between; }
  .card .actions a { font-size: 11px; color: #5a4a1a; text-decoration: none; }
  .card .yt-thumb { width: 100%; aspect-ratio: 16/9; background: #efece4 center/cover no-repeat; border-radius: 6px; margin: -2px 0 4px; }
  .card .yt-stats { display: flex; gap: 10px; font-size: 11px; color: #555; flex-wrap: wrap; }
  .card .yt-stats .views { font-weight: 600; color: #b04545; }
  .empty { text-align: center; padding: 30px 16px; color: #888; font-size: 13px; }
  .loading {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid #d8d5cd; border-top-color: #2f3640; border-radius: 50%;
    animation: spin 0.8s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: #2f3640; color: #fff; padding: 8px 14px; border-radius: 6px;
    font-size: 12px; z-index: 999; opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .pane { display: none; }
  .pane.active { display: block; }
  details.clients {
    background: #fff; border: 1px solid #e7e5df; border-radius: 8px;
    padding: 8px 12px; margin: 8px 12px;
  }
  details.clients summary { cursor: pointer; font-weight: 600; font-size: 12.5px; }
  details.clients .body { padding-top: 8px; }
  details.clients textarea {
    width: 100%; min-height: 80px; padding: 6px 8px;
    border: 1px solid #d8d5cd; border-radius: 6px; font-family: inherit;
    font-size: 12px; resize: vertical; box-sizing: border-box;
  }
  details.clients .row { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
  details.clients .client-count {
    background: #fde8e8; color: #a83232; padding: 1px 7px; border-radius: 999px;
    font-size: 10.5px; margin-left: 4px; font-weight: 600;
  }
</style>
</head>
<body>

<header class="top">
  <h1>세왕상사 · 신규업장 모니터</h1>
  <div class="sub">전국 · 매일 자동 수집</div>
</header>

<details class="clients" id="clients-panel">
  <summary>🏷️ 거래처 명단 <span class="client-count" id="client-count">0개</span></summary>
  <div class="body">
    <textarea id="client-list" placeholder="매장명을 한 줄에 하나씩"></textarea>
    <div class="row">
      <button class="btn small" id="client-save">저장</button>
      <button class="btn small ghost" id="client-clear">초기화</button>
      <input type="file" id="client-file" accept=".json,.txt" style="display:none">
      <button class="btn small ghost" id="client-file-btn" style="background:#eaf2e8;color:#3d6033;border-color:#3d6033">📁 파일 임포트</button>
      <span style="font-size:10.5px;color:#888" id="client-saved"></span>
    </div>
  </div>
</details>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="new">🆕 신규 <span class="count" id="cnt-new">·</span></div>
  <div class="tab" data-tab="hot">🔥 인기 <span class="count" id="cnt-hot">·</span></div>
  <div class="tab" data-tab="franchise">🏪 프랜차이즈 <span class="count" id="cnt-franchise">·</span></div>
  <div class="tab" data-tab="youtube">📺 유튜브 <span class="count" id="cnt-youtube">·</span></div>
  <div class="tab" data-tab="place">📍 네이버플레이스 <span class="count" id="cnt-place">·</span></div>
  <div class="tab" data-tab="watch">⭐ 추적 <span class="count" id="cnt-watch">·</span></div>
</div>

<div class="pane active" id="pane-new">
  <div class="controls">
    <select id="new-region">
      <option value="">전국</option>
      <option>서울</option><option>경기</option><option>인천</option>
      <option>부산</option><option>대구</option><option>광주</option>
      <option>대전</option><option>울산</option><option>제주</option>
      <option>강원</option><option>충북</option><option>충남</option>
      <option>전북</option><option>전남</option><option>경북</option>
      <option>경남</option>
    </select>
    <select id="new-cat">
      <option value="술집|이자카야|와인바|호프|펍|위스키바|막걸리|포차|요리주점|한식주점">전체 주류</option>
      <option value="이자카야|일본식주점">이자카야</option>
      <option value="와인바|와인">와인바</option>
      <option value="위스키바|위스키">위스키</option>
      <option value="호프|펍|크래프트맥주|수제맥주">호프/맥주</option>
      <option value="포차|요리주점|한식주점">포차</option>
      <option value="막걸리|전통주">막걸리</option>
    </select>
    <button class="btn" id="new-refresh">갱신</button>
    <span id="new-loading" style="display:none"><span class="loading"></span></span>
  </div>
  <div class="filter-row" data-tab="new">
    <button class="filter-btn active" data-f="all">전체</button>
    <button class="filter-btn" data-f="client">거래처</button>
    <button class="filter-btn" data-f="prospect">신규영업</button>
  </div>
  <div class="panel"><div class="grid" id="new-grid"></div>
    <div class="empty" id="new-empty" style="display:none">결과가 없습니다.</div>
  </div>
</div>

<div class="pane" id="pane-hot">
  <div class="controls">
    <select id="hot-region">
      <option value="">전국</option>
      <option>서울</option><option>경기</option><option>부산</option>
      <option>대구</option><option>광주</option><option>대전</option>
    </select>
    <input id="hot-keyword" placeholder="핫플 술집" value="" style="flex:1;min-width:120px">
    <button class="btn" id="hot-refresh">갱신</button>
    <span id="hot-loading" style="display:none"><span class="loading"></span></span>
  </div>
  <div class="filter-row" data-tab="hot">
    <button class="filter-btn active" data-f="all">전체</button>
    <button class="filter-btn" data-f="client">거래처</button>
    <button class="filter-btn" data-f="prospect">신규영업</button>
  </div>
  <div class="panel"><div class="grid" id="hot-grid"></div>
    <div class="empty" id="hot-empty" style="display:none">결과 없음</div>
  </div>
</div>

<div class="pane" id="pane-franchise">
  <div class="controls">
    <select id="fr-keyword" style="flex:1">
      <option value="프랜차이즈 가맹점 오픈">전체 가맹점</option>
      <option value="이자카야 프랜차이즈 가맹">이자카야</option>
      <option value="포차 프랜차이즈 가맹점">포차</option>
      <option value="와인바 프랜차이즈 가맹">와인바</option>
      <option value="수제맥주 펍 프랜차이즈">수제맥주</option>
      <option value="치킨 프랜차이즈 신규 출점">치킨</option>
    </select>
    <button class="btn" id="fr-refresh">갱신</button>
    <span id="fr-loading" style="display:none"><span class="loading"></span></span>
  </div>
  <div class="filter-row" data-tab="franchise">
    <button class="filter-btn active" data-f="all">전체</button>
    <button class="filter-btn" data-f="client">거래처</button>
    <button class="filter-btn" data-f="prospect">신규영업</button>
  </div>
  <div class="panel"><div class="grid" id="fr-grid"></div>
    <div class="empty" id="fr-empty" style="display:none">결과 없음</div>
  </div>
</div>

<div class="pane" id="pane-youtube">
  <div class="controls">
    <select id="yt-keyword" style="flex:1;min-width:120px">
      <option value="신규오픈 술집">신규오픈 술집</option>
      <option value="새로 오픈한 이자카야">신규 이자카야</option>
      <option value="와인바 신규오픈 추천">와인바 신규</option>
      <option value="신상 맛집 술집 리뷰">신상 술집</option>
      <option value="서울 핫플 술집">서울 핫플</option>
    </select>
    <select id="yt-order">
      <option value="date">최신</option>
      <option value="viewCount">조회수</option>
    </select>
    <button class="btn" id="yt-refresh">갱신</button>
    <span id="yt-loading" style="display:none"><span class="loading"></span></span>
  </div>
  <div class="filter-row" data-tab="youtube">
    <button class="filter-btn active" data-f="all">전체</button>
    <button class="filter-btn" data-f="client">거래처</button>
    <button class="filter-btn" data-f="prospect">신규영업</button>
  </div>
  <div class="panel"><div class="grid" id="yt-grid"></div>
    <div class="empty" id="yt-empty" style="display:none">결과 없음 (YouTube API 키 미설정 시 빈 결과)</div>
  </div>
</div>

<div class="pane" id="pane-place">
  <div class="controls">
    <select id="place-region">
      <option value="">전국</option>
      <option>서울</option><option>경기</option><option>인천</option>
      <option>부산</option><option>대구</option><option>광주</option>
      <option>대전</option><option>울산</option><option>제주</option>
    </select>
    <select id="place-cat">
      <option value="술집">전체 술집</option>
      <option value="이자카야">이자카야</option>
      <option value="와인바">와인바</option>
      <option value="위스키바">위스키바</option>
      <option value="호프집">호프집</option>
      <option value="포차">포차</option>
      <option value="한식주점">한식주점</option>
      <option value="요리주점">요리주점</option>
      <option value="막걸리">막걸리</option>
    </select>
    <button class="btn" id="place-refresh">갱신</button>
    <span id="place-loading" style="display:none"><span class="loading"></span></span>
  </div>
  <div class="filter-row" data-tab="place">
    <button class="filter-btn active" data-f="all">전체</button>
    <button class="filter-btn" data-f="client">거래처</button>
    <button class="filter-btn" data-f="prospect">신규영업</button>
  </div>
  <div class="panel"><div class="grid" id="place-grid"></div>
    <div class="empty" id="place-empty" style="display:none">결과 없음</div>
  </div>
</div>

<div class="pane" id="pane-watch">
  <div class="controls">
    <input id="watch-add" placeholder="추적 매장명 직접 추가" style="flex:1;min-width:140px">
    <button class="btn" id="watch-add-btn">추가</button>
    <button class="btn ghost" id="watch-refresh">전체 갱신</button>
    <span id="watch-loading" style="display:none"><span class="loading"></span></span>
  </div>
  <div class="panel"><div class="grid" id="watch-grid"></div>
    <div class="empty" id="watch-empty" style="display:none">추적 매장이 없습니다. 다른 탭의 ⭐버튼으로 추가하거나 위에서 직접 입력하세요.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const STATE_KEY = 'sewang-pwa-v1';
  const state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
  state.watchList = state.watchList || [];
  state.clients = state.clients || [];
  state.tabFilters = state.tabFilters || {};
  function save(){ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

  function stripTags(s){ return (s||'').replace(/<[^>]+>/g,''); }
  function fmtDate(s){
    if(!s) return '';
    if(/^\d{8}$/.test(s)) return s.slice(4,6)+'.'+s.slice(6,8);
    try { const d = new Date(s); if(isNaN(d)) return s;
      return d.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}); } catch(e){ return s; }
  }
  const REGIONS = ['서울','경기','인천','부산','대구','광주','대전','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주'];
  function extractRegion(t){ for(const r of REGIONS){ if((t||'').indexOf(r)!==-1) return r; } return null; }
  function extractStoreName(t){
    t = stripTags(t); const m=t.match(/^\[[^\]]+\]\s*([^\s,|·-]+)/);
    if(m) return m[1]; return t.split(/[|·,()-]/)[0].trim().slice(0,30);
  }
  function toast(m){ const t=document.getElementById('toast'); t.textContent=m;
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
  function isClient(text){
    if(!state.clients||state.clients.length===0) return null;
    const b=(text||'').toLowerCase();
    for(const c of state.clients){
      if(!c) continue;
      if(typeof c === 'object' && c.n){
        if(b.indexOf(c.n.toLowerCase()) === -1) continue;
        if(c.n.length < 5){
          const aMatch = (c.d && b.indexOf(c.d.toLowerCase())!==-1) || (c.g && b.indexOf(c.g.toLowerCase())!==-1) || (c.r && b.indexOf(c.r.toLowerCase())!==-1);
          if(!aMatch) continue;
        }
        return c.d ? c.n+' ('+c.d+')' : c.n;
      }
      if(typeof c === 'string' && b.indexOf(c.toLowerCase())!==-1) return c;
    }
    return null;
  }
  function applyFilter(tab){
    const f = state.tabFilters[tab]||'all';
    const grid = document.getElementById(
      tab==='new'?'new-grid':tab==='hot'?'hot-grid':tab==='franchise'?'fr-grid':tab==='youtube'?'yt-grid':tab==='place'?'place-grid':null
    );
    if(!grid) return;
    grid.querySelectorAll('.card').forEach(c=>{
      const isC=c.classList.contains('client');
      let show=true; if(f==='client') show=isC; else if(f==='prospect') show=!isC;
      c.style.display=show?'':'none';
    });
  }

  // API 호출 (Vercel 서버리스 프록시 경유)
  async function apiBlog(query, sort='date', display=10){
    const r = await fetch(`./api/blog?query=${encodeURIComponent(query)}&sort=${sort}&display=${display}`);
    if(!r.ok) throw new Error('네이버 블로그 API 오류 ('+r.status+')');
    return r.json();
  }
  async function apiNews(query, sort='date', display=10){
    const r = await fetch(`./api/news?query=${encodeURIComponent(query)}&sort=${sort}&display=${display}`);
    if(!r.ok) throw new Error('뉴스 API 오류');
    return r.json();
  }
  async function apiCafe(query, sort='date', display=10){
    const r = await fetch(`./api/cafe?query=${encodeURIComponent(query)}&sort=${sort}&display=${display}`);
    if(!r.ok) throw new Error('카페 API 오류');
    return r.json();
  }
  async function apiPlace(query, sort='comment', display=5){
    const r = await fetch(`./api/local?query=${encodeURIComponent(query)}&sort=${sort}&display=${display}`);
    if(!r.ok) throw new Error('네이버 지역 API 오류');
    return r.json();
  }
  async function apiYouTube(query, order='date', max_results=12){
    const r = await fetch(`./api/youtube?query=${encodeURIComponent(query)}&order=${order}&max_results=${max_results}`);
    if(!r.ok) throw new Error('유튜브 API 오류');
    return r.json();
  }

  function renderCard(item, opts={}){
    const title = stripTags(item.title||'');
    const desc = stripTags(item.description||'');
    const link = item.link || item.originallink || '#';
    const date = fmtDate(item.postdate || item.pubDate || '');
    const region = extractRegion(title+' '+desc);
    const storeName = opts.storeName || extractStoreName(title);
    const source = opts.source || (item.bloggername?'블로그':item.pubDate?'뉴스':'');
    const blob = title+' '+desc;
    const cm = isClient(blob);
    const card = document.createElement('div'); card.className='card'+(cm?' client':'');
    const titleHtml = (item.title||'').replace(/<\/?b>/g,'<b>') || title;
    card.innerHTML = `
      <div class="title">${titleHtml}</div>
      <div class="meta">
        ${cm?`<span class="badge client">거래중·${cm}</span>`:''}
        ${region?`<span class="badge region">${region}</span>`:''}
        ${opts.cat?`<span class="badge cat">${opts.cat}</span>`:''}
        ${date?`<span>📅 ${date}</span>`:''}
        ${source?`<span>${source}</span>`:''}
      </div>
      <div class="desc">${(item.description||'').replace(/<\/?b>/g,'<b>')}</div>
      <div class="actions">
        <a href="${link}" target="_blank" rel="noopener">원문 ↗</a>
        <a href="https://map.naver.com/p/search/${encodeURIComponent(storeName)}" target="_blank" rel="noopener" style="color:#3d6033">📍 플레이스</a>
        <button class="btn small ghost" data-store="${storeName}">⭐ 추적</button>
      </div>`;
    card.querySelector('button').addEventListener('click',e=>addWatch(e.currentTarget.dataset.store));
    return card;
  }

  function fmtViews(n){ n=Number(n)||0;
    if(n>=10000) return (n/10000).toFixed(n>=100000?0:1)+'만';
    if(n>=1000) return (n/1000).toFixed(1)+'천';
    return n+''; }
  function ytCard(v){
    const id = v.videoId||'';
    const title = stripTags(v.title||'');
    const desc = stripTags(v.description||'');
    const url = id?`https://www.youtube.com/watch?v=${id}`:'#';
    const thumb = v.thumbnail || (id?`https://i.ytimg.com/vi/${id}/mqdefault.jpg`:'');
    const region = extractRegion(title+' '+desc);
    const cm = isClient(title+' '+desc);
    const card = document.createElement('div'); card.className='card'+(cm?' client':'');
    card.innerHTML = `
      ${thumb?`<a href="${url}" target="_blank" rel="noopener"><div class="yt-thumb" style="background-image:url('${thumb}')"></div></a>`:''}
      <div class="title">${title}</div>
      <div class="meta">
        ${cm?`<span class="badge client">거래중·${cm}</span>`:''}
        ${region?`<span class="badge region">${region}</span>`:''}
        <span class="badge cat">📺 YT</span>
        ${v.publishedAt?`<span>📅 ${fmtDate(v.publishedAt)}</span>`:''}
      </div>
      <div class="yt-stats">
        ${v.viewCount?`<span class="views">▶ ${fmtViews(v.viewCount)}</span>`:''}
        ${v.likeCount?`<span>👍 ${fmtViews(v.likeCount)}</span>`:''}
        ${v.channelTitle?`<span>· ${v.channelTitle}</span>`:''}
      </div>
      <div class="desc">${desc.slice(0,150)}</div>
      <div class="actions">
        <a href="${url}" target="_blank" rel="noopener">영상 ↗</a>
        <a href="https://map.naver.com/p/search/${encodeURIComponent(extractStoreName(title))}" target="_blank" rel="noopener" style="color:#3d6033">📍 플레이스</a>
        <button class="btn small ghost" data-store="${extractStoreName(title)}">⭐ 추적</button>
      </div>`;
    card.querySelector('button').addEventListener('click',e=>addWatch(e.currentTarget.dataset.store));
    return card;
  }

  // 추적 매장
  function addWatch(name){
    name=(name||'').trim(); if(!name) return;
    if(state.watchList.find(w=>w.name===name)){ toast('이미 추적: '+name); return; }
    state.watchList.push({name,addedAt:new Date().toISOString()}); save();
    document.getElementById('cnt-watch').textContent = state.watchList.length;
    toast('⭐ '+name);
  }
  function rmWatch(name){
    state.watchList = state.watchList.filter(w=>w.name!==name); save();
    document.getElementById('cnt-watch').textContent = state.watchList.length;
    renderWatch();
  }
  function renderWatch(){
    const grid = document.getElementById('watch-grid');
    const empty = document.getElementById('watch-empty');
    grid.innerHTML='';
    if(state.watchList.length===0){ empty.style.display='block'; return; }
    empty.style.display='none';
    state.watchList.forEach(w=>{
      const c = document.createElement('div'); c.className='card';
      const isC = isClient(w.name);
      if(isC) c.classList.add('client');
      c.innerHTML = `
        <div class="title">⭐ ${w.name}</div>
        <div class="meta">
          ${isC?`<span class="badge client">거래중</span>`:''}
          <span class="badge">추적 ${fmtDate(w.addedAt.slice(0,10).replace(/-/g,''))}</span>
          ${w.lastCheck?`<span>· 확인 ${fmtDate(w.lastCheck.slice(0,10).replace(/-/g,''))}</span>`:''}
          ${w.recentCount!=null?`<span>· 언급 ${w.recentCount}건</span>`:''}
        </div>
        <div class="desc">${w.lastSnippet||'갱신 버튼을 눌러 최근 동향 수집'}</div>
        <div class="actions">
          <a href="https://search.naver.com/search.naver?query=${encodeURIComponent(w.name)}" target="_blank" rel="noopener">네이버 ↗</a>
          <button class="btn small ghost" data-rm="${w.name}">🗑 해제</button>
        </div>`;
      c.querySelector('[data-rm]').addEventListener('click',()=>rmWatch(w.name));
      grid.appendChild(c);
    });
  }

  async function loadNew(){
    const region=document.getElementById('new-region').value;
    const cats = document.getElementById('new-cat').value.split('|');
    const grid=document.getElementById('new-grid'), empty=document.getElementById('new-empty'), loading=document.getElementById('new-loading');
    grid.innerHTML=''; empty.style.display='none'; loading.style.display='inline';
    const queries = cats.slice(0,3).map(c=>`${region?region+' ':''}신규오픈 ${c}`);
    queries.push(`${region?region+' ':''}새로오픈 ${cats[0]}`);
    const seen=new Set(); const all=[];
    try{
      const rs = await Promise.all(queries.map(q=>apiBlog(q,'date',8)));
      rs.forEach((r,i)=>{
        (r.items||[]).forEach(it=>{
          const k=(it.link||'')+'|'+(it.title||'').slice(0,30);
          if(seen.has(k)) return; seen.add(k);
          const blob=(it.title+' '+it.description).toLowerCase();
          if(!/신규.?오픈|새로.?오픈|new.?open|grand.?open|이번에.?오픈|오픈했/i.test(blob)) return;
          if(!cats.some(c=>blob.indexOf(c.toLowerCase())!==-1)) return;
          if(region && (it.title+' '+it.description).indexOf(region)===-1) return;
          all.push({...it,_cat:cats[i]||cats[0]});
        });
      });
      all.sort((a,b)=>(b.postdate||'').localeCompare(a.postdate||''));
      const top = all.slice(0,30);
      document.getElementById('cnt-new').textContent = top.length;
      if(top.length===0) empty.style.display='block';
      else top.forEach(it=>grid.appendChild(renderCard(it,{cat:it._cat})));
      applyFilter('new');
    }catch(e){ empty.textContent='오류: '+e.message; empty.style.display='block'; }
    finally{ loading.style.display='none'; }
  }

  async function loadHot(){
    const region=document.getElementById('hot-region').value;
    const kw = document.getElementById('hot-keyword').value.trim()||'핫플 술집';
    const grid=document.getElementById('hot-grid'), empty=document.getElementById('hot-empty'), loading=document.getElementById('hot-loading');
    grid.innerHTML=''; empty.style.display='none'; loading.style.display='inline';
    try{
      const [b1,b2,c1] = await Promise.all([
        apiBlog(`${region?region+' ':''}${kw} 리뷰 많은`,'date',8),
        apiBlog(`${region?region+' ':''}${kw} 평점 좋은 신규`,'date',8),
        apiCafe(`${region?region+' ':''}${kw} 웨이팅`,'date',6),
      ]);
      const seen=new Set(); const all=[];
      [b1,b2,c1].forEach(r=>{
        (r.items||[]).forEach(it=>{
          const k=(it.link||'')+'|'+(it.title||'').slice(0,30);
          if(seen.has(k)) return; seen.add(k);
          if(region && (it.title+' '+it.description).indexOf(region)===-1) return;
          all.push(it);
        });
      });
      all.sort((a,b)=>(b.postdate||'').localeCompare(a.postdate||''));
      const top=all.slice(0,24);
      document.getElementById('cnt-hot').textContent=top.length;
      if(top.length===0) empty.style.display='block';
      else top.forEach(it=>grid.appendChild(renderCard(it,{cat:'인기'})));
      applyFilter('hot');
    }catch(e){ empty.textContent='오류: '+e.message; empty.style.display='block'; }
    finally{ loading.style.display='none'; }
  }

  async function loadFranchise(){
    const kw=document.getElementById('fr-keyword').value;
    const grid=document.getElementById('fr-grid'), empty=document.getElementById('fr-empty'), loading=document.getElementById('fr-loading');
    grid.innerHTML=''; empty.style.display='none'; loading.style.display='inline';
    try{
      const [n1,n2] = await Promise.all([apiNews(kw,'date',12),apiNews(kw+' 확장','date',8)]);
      const seen=new Set(); const all=[];
      [n1,n2].forEach(r=>{
        (r.items||[]).forEach(it=>{
          const k=(it.originallink||it.link||'')+'|'+(it.title||'').slice(0,30);
          if(seen.has(k)) return; seen.add(k);
          const blob=(it.title+' '+it.description).toLowerCase();
          if(!/오픈|출점|가맹|매장.?확대|점포.?확대|신규.?매장|확장|입점|런칭|개점/i.test(blob)) return;
          all.push(it);
        });
      });
      all.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));
      const top=all.slice(0,20);
      document.getElementById('cnt-franchise').textContent=top.length;
      if(top.length===0) empty.style.display='block';
      else top.forEach(it=>grid.appendChild(renderCard(it,{cat:'프랜차이즈',source:'뉴스'})));
      applyFilter('franchise');
    }catch(e){ empty.textContent='오류: '+e.message; empty.style.display='block'; }
    finally{ loading.style.display='none'; }
  }

  async function loadYouTube(){
    const kw=document.getElementById('yt-keyword').value;
    const order=document.getElementById('yt-order').value;
    const grid=document.getElementById('yt-grid'), empty=document.getElementById('yt-empty'), loading=document.getElementById('yt-loading');
    grid.innerHTML=''; empty.style.display='none'; loading.style.display='inline';
    try{
      const r = await apiYouTube(kw,order,15);
      const items = r.items||[];
      document.getElementById('cnt-youtube').textContent=items.length;
      if(items.length===0){ empty.style.display='block'; }
      else items.forEach(v=>grid.appendChild(ytCard(v)));
      applyFilter('youtube');
    }catch(e){ empty.textContent='오류: '+e.message; empty.style.display='block'; }
    finally{ loading.style.display='none'; }
  }

  
  async function loadPlace(){
    const region = document.getElementById('place-region').value;
    const cat = document.getElementById('place-cat').value;
    const grid = document.getElementById('place-grid'), empty = document.getElementById('place-empty'), loading = document.getElementById('place-loading');
    grid.innerHTML=''; empty.style.display='none'; loading.style.display='inline';
    try {
      // 지역 + 카테고리로 여러 검색 (각각 최대 5개씩)
      const queries = [
        `${region?region+' ':''}${cat}`,
        `${region?region+' ':''}신규 ${cat}`,
      ];
      const seen = new Set(); const all = [];
      const rs = await Promise.all(queries.map(q => apiPlace(q, 'comment', 5).catch(()=>({items:[]}))));
      rs.forEach(r => {
        (r.items||[]).forEach(it => {
          const k = it.title + '|' + it.address;
          if(seen.has(k)) return; seen.add(k);
          if(region && (it.address||'').indexOf(region)===-1 && (it.roadAddress||'').indexOf(region)===-1) return;
          all.push(it);
        });
      });
      document.getElementById('cnt-place').textContent = all.length;
      if(all.length === 0) empty.style.display='block';
      else all.forEach(it => {
        const card = document.createElement('div');
        const name = stripTags(it.title);
        const blob = name + ' ' + it.category + ' ' + it.address;
        const cm = isClient(blob);
        card.className = 'card' + (cm ? ' client' : '');
        const placeUrl = `https://map.naver.com/p/search/${encodeURIComponent(name)}`;
        const region2 = extractRegion(it.address + ' ' + it.roadAddress);
        card.innerHTML = `
          <div class="title">${name}</div>
          <div class="meta">
            ${cm?`<span class="badge client">거래중·${cm}</span>`:''}
            ${region2?`<span class="badge region">${region2}</span>`:''}
            <span class="badge cat">📍 플레이스</span>
            <span>${stripTags(it.category||'')}</span>
          </div>
          <div class="desc">${stripTags(it.roadAddress||it.address||'')}${it.telephone?' · '+it.telephone:''}</div>
          <div class="actions">
            <a href="${placeUrl}" target="_blank" rel="noopener">📍 플레이스 ↗</a>
            <button class="btn small ghost" data-store="${name}">⭐ 추적</button>
          </div>`;
        card.querySelector('button').addEventListener('click', e => addWatch(e.currentTarget.dataset.store));
        grid.appendChild(card);
      });
      applyFilter('place');
    } catch(e) { empty.textContent='오류: '+e.message; empty.style.display='block'; }
    finally { loading.style.display='none'; }
  }

  async function refreshWatch(){
    if(state.watchList.length===0){ toast('추적 매장 없음'); return; }
    const loading=document.getElementById('watch-loading');
    loading.style.display='inline';
    try{
      for(const w of state.watchList){
        try{
          const r = await apiBlog(w.name,'date',5);
          const items = (r.items||[]).filter(it=>(it.title+it.description).indexOf(w.name)!==-1);
          w.recentCount = items.length;
          w.lastCheck = new Date().toISOString();
          w.lastSnippet = items.length>0
            ? stripTags(items[0].description||'').slice(0,160)+(items[0].postdate?` (${fmtDate(items[0].postdate)})`:'')
            : '최근 1주일 내 신규 언급 없음';
        }catch(e){ w.lastSnippet='갱신 실패: '+e.message; }
      }
      save(); renderWatch(); toast(state.watchList.length+'건 갱신');
    }finally{ loading.style.display='none'; }
  }

  // 탭 전환
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('pane-'+t.dataset.tab).classList.add('active');
      const tab=t.dataset.tab;
      if(tab==='watch') renderWatch();
      if(!t.dataset.loaded){
        t.dataset.loaded='1';
        if(tab==='hot') loadHot();
        else if(tab==='franchise') loadFranchise();
        else if(tab==='youtube') loadYouTube();
        else if(tab==='place') loadPlace();
      }
    });
  });

  // 필터 버튼
  document.querySelectorAll('.filter-row').forEach(row=>{
    const tab = row.dataset.tab;
    row.querySelectorAll('.filter-btn').forEach(b=>{
      b.addEventListener('click',()=>{
        row.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        state.tabFilters[tab]=b.dataset.f; save(); applyFilter(tab);
      });
    });
    const saved=state.tabFilters[tab];
    if(saved){ row.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===saved)); }
  });

  // 거래처 입력
  function renderClientCount(){ document.getElementById('client-count').textContent=(state.clients.length||0)+'개'; }
  document.getElementById('client-list').value = (state.clients||[]).map(c => typeof c==='object' ? c.n : c).join('\n');
  renderClientCount();
  document.getElementById('client-save').addEventListener('click',()=>{
    const lines = document.getElementById('client-list').value.split('\n').map(s=>s.trim()).filter(s=>s);
    state.clients = Array.from(new Set(lines)); save();
    renderClientCount();
    document.getElementById('client-saved').textContent='✅ '+state.clients.length+'개 저장';
    const tab = document.querySelector('.tab.active').dataset.tab;
    if(tab==='new') loadNew();
    else if(tab==='hot') loadHot();
    else if(tab==='franchise') loadFranchise();
    else if(tab==='youtube') loadYouTube();
    else if(tab==='place') loadPlace();
    document.querySelectorAll('.tab').forEach(t=>{ if(t.dataset.tab!==tab) delete t.dataset.loaded; });
  });
  document.getElementById('client-file-btn').addEventListener('click',()=>document.getElementById('client-file').click());
  document.getElementById('client-file').addEventListener('change', async e => {
    const f = e.target.files[0]; if(!f) return;
    const text = await f.text();
    let imported = [];
    try { const j = JSON.parse(text); if(Array.isArray(j)) imported = j.filter(x => x && (typeof x==='string' || x.n)); } catch(_){}
    if(imported.length === 0) imported = text.split('\n').map(s => s.trim()).filter(s => s);
    state.clients = imported; save(); renderClientCount();
    document.getElementById('client-list').value = imported.map(c => typeof c==='object' ? c.n : c).join('\n');
    document.getElementById('client-saved').textContent = '✅ '+imported.length+'개 임포트 완료';
    const tab = document.querySelector('.tab.active').dataset.tab;
    if(tab==='new') loadNew(); else if(tab==='hot') loadHot(); else if(tab==='franchise') loadFranchise(); else if(tab==='youtube') loadYouTube(); else if(tab==='place') loadPlace();
    document.querySelectorAll('.tab').forEach(t => { if(t.dataset.tab !== tab) delete t.dataset.loaded; });
  });
  document.getElementById('client-clear').addEventListener('click',()=>{
    if(!confirm('거래처 명단 모두 삭제?')) return;
    state.clients=[]; save();
    document.getElementById('client-list').value=''; renderClientCount();
  });

  // 이벤트
  document.getElementById('new-refresh').addEventListener('click',loadNew);
  document.getElementById('hot-refresh').addEventListener('click',loadHot);
  document.getElementById('fr-refresh').addEventListener('click',loadFranchise);
  document.getElementById('yt-refresh').addEventListener('click',loadYouTube);
  document.getElementById('place-refresh').addEventListener('click',loadPlace);
  document.getElementById('watch-refresh').addEventListener('click',refreshWatch);
  document.getElementById('watch-add-btn').addEventListener('click',()=>{
    const i = document.getElementById('watch-add'); addWatch(i.value); i.value=''; renderWatch();
  });
  document.getElementById('watch-add').addEventListener('keydown',e=>{
    if(e.key==='Enter'){ addWatch(e.target.value); e.target.value=''; renderWatch(); }
  });

  document.getElementById('cnt-watch').textContent = state.watchList.length;
  loadNew();

  // 서비스 워커 (기본 캐시 - 오프라인 대응)
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
})();
</script>
</body>
</html>
