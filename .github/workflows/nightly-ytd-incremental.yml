name: Nightly YTD Incremental
# v16.8: 다중 schedule (GitHub Actions silent skip 방어)
on:
  schedule:
    - cron: '15 19 * * *'   # 04:15 KST (메인)
    - cron: '0 21 * * *'    # 06:00 KST (1차 재시도)
    - cron: '0 23 * * *'    # 08:00 KST (2차 재시도)
    - cron: '0 1 * * *'     # 10:00 KST (3차 재시도)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-yesterday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute yesterday (KST)
        id: dates
        run: |
          YESTERDAY=$(TZ=Asia/Seoul date -d "yesterday" +%Y%m%d)
          echo "from=$YESTERDAY" >> $GITHUB_OUTPUT
          echo "to=$YESTERDAY" >> $GITHUB_OUTPUT
          echo "Yesterday: $YESTERDAY"
      - name: Check if today's data already exists (idempotent)
        id: check
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y%m%d)
          YESTERDAY_FILE="data/ytd_2026/${{ steps.dates.outputs.from }}.json"
          if [ -f "$YESTERDAY_FILE" ]; then
            SIZE=$(stat -c%s "$YESTERDAY_FILE" 2>/dev/null || stat -f%z "$YESTERDAY_FILE" 2>/dev/null)
            if [ "$SIZE" -gt "1000" ]; then
              echo "already_done=true" >> $GITHUB_OUTPUT
              echo "Today already processed (size $SIZE) — skip"
              exit 0
            fi
          fi
          echo "already_done=false" >> $GITHUB_OUTPUT
      - name: Fetch YTD daily
        if: steps.check.outputs.already_done != 'true'
        env:
          FROM_DATE: ${{ steps.dates.outputs.from }}
          TO_DATE: ${{ steps.dates.outputs.to }}
        run: bash scripts/fetch-ytd-range.sh
      - name: Aggregate YTD
        if: steps.check.outputs.already_done != 'true'
        run: python3 scripts/aggregate-ytd.py
      - name: Commit via GitHub Contents API (rebase 충돌 무관)
        if: steps.check.outputs.already_done != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DATE_FROM: ${{ steps.dates.outputs.from }}
        run: |
          python3 << 'PYEOF'
          import base64, json, os, time, urllib.request, urllib.error
          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          date_from = os.environ['DATE_FROM']
          headers = {'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json', 'User-Agent': 'ytd-cron'}
          # 2개 파일: 일간 json + summary
          files = []
          daily = f'data/ytd_2026/{date_from}.json'
          if os.path.exists(daily): files.append(daily)
          summary = 'data/ytd_2026_summary.json'
          if os.path.exists(summary): files.append(summary)
          if not files:
              print('No files to commit')
              raise SystemExit(0)
          for path in files:
              api = f'https://api.github.com/repos/{repo}/contents/{path}'
              with open(path, 'rb') as f:
                  content_b64 = base64.b64encode(f.read()).decode('ascii')
              msg = f'YTD nightly: {date_from} — {path.split("/")[-1]}'
              def get_sha():
                  try:
                      req = urllib.request.Request(api, headers=headers)
                      with urllib.request.urlopen(req) as r:
                          return json.loads(r.read()).get('sha', '')
                  except Exception:
                      return ''
              sha = get_sha()
              for attempt in range(3):
                  body = {'message': msg, 'content': content_b64}
                  if sha: body['sha'] = sha
                  data = json.dumps(body).encode()
                  req = urllib.request.Request(api, data=data, headers={**headers, 'Content-Type': 'application/json'}, method='PUT')
                  try:
                      with urllib.request.urlopen(req) as r:
                          print(f'✅ {path} (attempt {attempt+1})')
                          break
                  except urllib.error.HTTPError as e:
                      print(f'  {path} attempt {attempt+1}: {e.code}')
                      if e.code == 409:
                          time.sleep(3)
                          sha = get_sha()
                      else:
                          time.sleep(3)
              else:
                  raise SystemExit(1)
          PYEOF
