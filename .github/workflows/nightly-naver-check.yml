name: Nightly Naver N-Check (priority queue)
on:
  schedule:
    # v16.8: 다중 schedule (silent skip 방어)
    - cron: '30 20 * * *'   # 05:30 KST (메인)
    - cron: '30 22 * * *'   # 07:30 KST (재시도)
    - cron: '30 0 * * *'    # 09:30 KST (재시도)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Daily limit (default 5000)'
        required: false
        default: '5000'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run N-check
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_DAILY_LIMIT: ${{ inputs.limit || '5000' }}
        run: python3 scripts/naver-nstat-check.py
      - name: Commit via GitHub Contents API (Python — 큰 파일 안전)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ ! -f data/naver_nstat_cache.json ]; then
            echo "No cache file generated"
            exit 0
          fi
          python3 << 'PYEOF'
          import base64, json, os, time, urllib.request, urllib.error
          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          path = 'data/naver_nstat_cache.json'
          api = f'https://api.github.com/repos/{repo}/contents/{path}'
          headers = {'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json', 'User-Agent': 'naver-check'}

          with open(path, 'rb') as f:
              content_b64 = base64.b64encode(f.read()).decode('ascii')
          msg = f'N-check {time.strftime("%Y-%m-%d", time.localtime())}: cache updated'

          def get_sha():
              try:
                  req = urllib.request.Request(api, headers=headers)
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read()).get('sha', '')
              except Exception:
                  return ''

          sha = get_sha()
          for attempt in range(3):
              body = {'message': msg, 'content': content_b64}
              if sha: body['sha'] = sha
              data = json.dumps(body).encode()
              req = urllib.request.Request(api, data=data, headers={**headers, 'Content-Type': 'application/json'}, method='PUT')
              try:
                  with urllib.request.urlopen(req) as r:
                      print(f'✅ Committed via API (attempt {attempt+1}, status {r.status})')
                      break
              except urllib.error.HTTPError as e:
                  print(f'Attempt {attempt+1} failed: {e.code} {e.reason}')
                  print(e.read().decode()[:300])
                  if e.code == 409:
                      time.sleep(3)
                      sha = get_sha()  # 다른 commit 들어갔을 수 있음
                  else:
                      time.sleep(3)
          else:
              print('All 3 attempts failed')
              import sys; sys.exit(1)
          PYEOF
