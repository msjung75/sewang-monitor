name: Nightly Naver N-Check (priority queue)
on:
  schedule:
    - cron: '30 20 * * *'   # 매일 20:30 UTC = 05:30 KST (YTD 04:15 + 1시간 이상 분리 — push 충돌 회피)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Daily limit (default 5000)'
        required: false
        default: '5000'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run N-check
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_DAILY_LIMIT: ${{ inputs.limit || '5000' }}
        run: python3 scripts/naver-nstat-check.py
      - name: Commit via GitHub Contents API (rebase 충돌 무관)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f data/naver_nstat_cache.json ]; then
            echo "No cache file generated"
            exit 0
          fi
          PATH_DATA="data/naver_nstat_cache.json"
          CONTENT=$(base64 -w 0 "$PATH_DATA")
          # 기존 sha 확인
          SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/$PATH_DATA" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null)
          MSG="N-check $(TZ=Asia/Seoul date +%Y-%m-%d): cache updated"
          if [ -z "$SHA" ]; then
            BODY=$(printf '{"message":"%s","content":"%s"}' "$MSG" "$CONTENT")
          else
            BODY=$(printf '{"message":"%s","content":"%s","sha":"%s"}' "$MSG" "$CONTENT" "$SHA")
          fi
          # 3회 재시도
          for attempt in 1 2 3; do
            RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/contents/$PATH_DATA" \
              -d "$BODY")
            STATUS=$(echo "$RESPONSE" | tail -n1)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "Committed via API (attempt $attempt, status $STATUS)"
              exit 0
            fi
            echo "Attempt $attempt failed (status $STATUS)"
            echo "$RESPONSE" | head -n -1
            # sha 다시 가져와서 retry (다른 commit이 들어갔을 수 있음)
            SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/$PATH_DATA" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null)
            BODY=$(printf '{"message":"%s","content":"%s","sha":"%s"}' "$MSG" "$CONTENT" "$SHA")
            sleep 3
          done
          echo "All attempts failed"
          exit 1
