name: nightly-trend30
on:
  schedule:
    # 메일 19:00 UTC = KST 04:00
    - cron: '0 19 * * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch 17 sido 30days
        run: bash scripts/nightly-fetch.sh
      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add data/trend30_all.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "[skip ci] nightly trend30 $(TZ=Asia/Seoul date +%Y-%m-%dT%H:%MZ)"
            git push
          fi
