name: Monthly Franchise Master (공정위 11,685 brand)
# 매월 1일 KST 04:00 — 공정위 가맹본부 brand 마스터 전체 수집
# 클라이언트 자동 매칭으로 사장님 수작업 alias 등록 부담 0
on:
  # schedule 제거 — DATA_GO_KR_KEY GitHub Secret 미등록 시 매월 실패 알림 옴
  # 클라이언트가 v15.9 Vercel 프록시로 우회하므로 cron 불필요
  # Secret 등록 후 schedule 다시 활성화 가능
  workflow_dispatch:
    inputs:
      year:
        description: '기준년도 (기본 2024)'
        required: false
        default: '2024'

permissions:
  contents: write

jobs:
  fetch-franchise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch franchise master
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          YEAR: ${{ github.event.inputs.year || '2024' }}
        run: python3 scripts/fetch-franchise-master.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/franchise_master.json
          if git diff --cached --quiet; then
            echo "No franchise master change"
          else
            git commit -m "Franchise master: 공정위 brand $(date +%Y-%m-%d)"
            git push
          fi
