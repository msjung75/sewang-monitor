name: Backfill 2026 YTD (manual)
on:
  workflow_dispatch:
    inputs:
      month:
        description: 'Month (yyyymm) — e.g. 202601 ~ 202606. all=전체 1~현재 월'
        required: true
        default: 'all'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        month: ['202601', '202602', '202603', '202604', '202605', '202606']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check gate
        id: gate
        run: |
          INPUT="${{ inputs.month }}"
          M="${{ matrix.month }}"
          # 지원 입력: all | 202603 | 202603,202604 | 202603~202606 | 202603-202606
          if [ "$INPUT" = "all" ]; then
            RESULT=true
          elif echo "$INPUT" | grep -q "$M"; then
            RESULT=true
          elif echo "$INPUT" | grep -qE '^[0-9]{6}[~-][0-9]{6}$'; then
            FROM=$(echo "$INPUT" | sed -E 's/[~-].*$//')
            TO=$(echo "$INPUT" | sed -E 's/^[0-9]{6}[~-]//')
            if [ "$M" \>= "$FROM" ] && [ "$M" \<= "$TO" ]; then RESULT=true; else RESULT=false; fi
          else
            RESULT=false
          fi
          echo "run=$RESULT" >> $GITHUB_OUTPUT
          echo "gate INPUT=$INPUT M=$M result=$RESULT"
      - name: Compute month range
        if: steps.gate.outputs.run == 'true'
        id: dates
        run: |
          M="${{ matrix.month }}"
          YEAR=${M:0:4}; MM=${M:4:2}
          FROM_DATE="${YEAR}${MM}01"
          NEXT=$(date -d "${YEAR}-${MM}-01 + 1 month - 1 day" +%Y%m%d)
          TODAY=$(TZ=Asia/Seoul date +%Y%m%d)
          if [ "$NEXT" \> "$TODAY" ]; then NEXT="$TODAY"; fi
          echo "from=$FROM_DATE" >> $GITHUB_OUTPUT
          echo "to=$NEXT" >> $GITHUB_OUTPUT
          echo "$M: $FROM_DATE -> $NEXT"
      - name: Fetch month
        if: steps.gate.outputs.run == 'true'
        env:
          FROM_DATE: ${{ steps.dates.outputs.from }}
          TO_DATE: ${{ steps.dates.outputs.to }}
        run: bash scripts/fetch-ytd-range.sh
      - name: Aggregate YTD
        if: steps.gate.outputs.run == 'true'
        run: python3 scripts/aggregate-ytd.py
      - name: Commit (안전 retry - 다른 매트릭스 파일 보존)
        if: steps.gate.outputs.run == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          M="${{ matrix.month }}"
          DATA_FILE="data/ytd_2026/${M}.json"
          SUMMARY_FILE="data/ytd_2026_summary.json"
          if [ ! -s "$DATA_FILE" ]; then
            echo "::error::no data file for $M"
            exit 1
          fi
          BYTES=$(stat -c %s "$DATA_FILE")
          echo "Month $M file: $BYTES bytes"
          # 우리 데이터를 임시 보관 후, origin/main에서 다른 매트릭스 결과를 가져옴
          cp "$DATA_FILE" /tmp/our_data.json
          [ -f "$SUMMARY_FILE" ] && cp "$SUMMARY_FILE" /tmp/our_summary.json
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            # 우리 파일 복원
            cp /tmp/our_data.json "$DATA_FILE"
            [ -f /tmp/our_summary.json ] && cp /tmp/our_summary.json "$SUMMARY_FILE"
            # aggregate 재실행 (다른 매트릭스 데이터 포함)
            python3 scripts/aggregate-ytd.py
            git add data/ytd_2026/ data/ytd_2026_summary.json
            if git diff --cached --quiet; then
              echo "No changes after rebase"
              exit 0
            fi
            git commit -m "YTD backfill ${M}: ${{ steps.dates.outputs.from }} -> ${{ steps.dates.outputs.to }} (${BYTES}B)"
            if git push origin main; then
              echo "Push success on try $i"
              exit 0
            fi
            echo "Push fail on try $i, sleep $((i*5))"
            sleep $((i*5))
          done
          echo "::error::Push failed after 5 retries"
          exit 1
